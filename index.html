<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>BDP Copy Studio</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />

        <style>
            /* ============ BRAND: BrickLink — yellow ramp (matches BDP Copy Studio) ============ */
            :root {
                --y50: #FFEF7A; --y100: #FFE636; --y200: #FFD502; --y300: #FAC400; --y900: #C9692B;
                --accent: #FFD502;        /* primary fill     */
                --accent-strong: #FAC400; /* hover / emphasis */
                --accent-deep: #C9692B;   /* readable on light */
                --accent-ink: #191a17;    /* text on yellow   */
                --display: 'Plus Jakarta Sans', system-ui, sans-serif;
                --body: 'Inter', system-ui, sans-serif;
                --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
                --ink: #1b1b1d; --ink-2: #3d3d40; --muted: #6f6e6a; --faint: #a6a39a;
                --line: #e8e6df; --line-2: #f0eee7; --surface: #ffffff; --canvas: #f4f2ec; --raise: #faf9f4;
                --shadow-sm: 0 1px 2px rgba(40, 34, 10, .06);
                --shadow: 0 2px 4px rgba(40, 34, 10, .05), 0 12px 30px rgba(40, 34, 10, .10);
                --shadow-lg: 0 26px 70px rgba(40, 34, 10, .24);
                --r: 14px; --r-sm: 10px;
            }
            /* ================================================================================= */

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 0;
                background:
                    radial-gradient(circle at 1px 1px, rgba(40, 34, 10, .05) 1.5px, transparent 1.6px) 0 0 / 26px 26px,
                    linear-gradient(180deg, var(--raise), var(--canvas));
                font-family: var(--body);
                color: var(--ink);
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-page {
                width: 400px;
                max-width: 100%;
                padding: 7% 16px 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--surface);
                max-width: 400px;
                margin: 0 auto 100px;
                padding: 40px 38px 38px;
                text-align: center;
                border: 1px solid var(--line);
                border-radius: var(--r);
                box-shadow: var(--shadow-lg);
            }

            /* top accent bar on the card */
            .staticrypt-form::before {
                content: "";
                position: absolute;
                inset: 0 0 auto 0;
                height: 5px;
                border-radius: var(--r) var(--r) 0 0;
                background: linear-gradient(90deg, var(--y200), var(--y300));
            }

            /* ---------- brand lockup ---------- */
            .staticrypt-brand {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 12px;
                margin-bottom: 26px;
            }

            .staticrypt-stud {
                width: 42px;
                height: 42px;
                border-radius: 11px;
                background: linear-gradient(140deg, var(--y200), var(--y300));
                position: relative;
                flex: 0 0 auto;
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, .5), 0 1px 2px rgba(40, 34, 10, .2);
            }

            .staticrypt-stud::before {
                content: "";
                position: absolute;
                inset: 8px;
                border-radius: 5px;
                background:
                    radial-gradient(circle at 25% 25%, rgba(25, 26, 23, .82) 3.4px, transparent 3.9px),
                    radial-gradient(circle at 75% 25%, rgba(25, 26, 23, .82) 3.4px, transparent 3.9px),
                    radial-gradient(circle at 25% 75%, rgba(25, 26, 23, .82) 3.4px, transparent 3.9px),
                    radial-gradient(circle at 75% 75%, rgba(25, 26, 23, .82) 3.4px, transparent 3.9px);
            }

            .staticrypt-wordmark {
                font-family: var(--display);
                font-size: 21px;
                font-weight: 800;
                letter-spacing: -.02em;
                color: var(--ink);
                white-space: nowrap;
            }

            .staticrypt-wordmark span {
                color: var(--muted);
                font-weight: 600;
            }

            .staticrypt-instructions {
                margin-top: 0;
                margin-bottom: 24px;
            }

            .staticrypt-title {
                font-family: var(--display);
                font-size: 1.18em;
                font-weight: 700;
                letter-spacing: -.01em;
                color: var(--ink);
                margin: 0 0 6px;
            }

            .staticrypt-instructions p:not(.staticrypt-title) {
                margin: 0;
                font-size: 14px;
                color: var(--muted);
            }

            .staticrypt-hr {
                margin: 22px 0;
                border: 0;
                border-top: 1px solid var(--line);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-family: var(--body);
                font-size: 15px;
                color: var(--ink);
                outline: 0;
                padding: 15px 44px 15px 16px;
                width: 100%;
            }

            .staticrypt-form input::placeholder {
                color: var(--faint);
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: var(--raise);
                width: 100%;
                border: 1px solid var(--line);
                border-radius: var(--r-sm);
                margin: 0 0 16px;
                box-sizing: border-box;
                transition: border-color .15s ease, box-shadow .15s ease;
            }

            .staticrypt-password-container:focus-within {
                border-color: var(--accent-strong);
                box-shadow: 0 0 0 3px rgba(250, 196, 0, .25);
                background: var(--surface);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 55%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: var(--display);
                font-weight: 700;
                letter-spacing: .04em;
                text-transform: uppercase;
                outline: 0;
                background: linear-gradient(140deg, var(--y200), var(--y300));
                width: 100%;
                border: 0;
                border-radius: var(--r-sm);
                padding: 15px;
                color: var(--accent-ink);
                font-size: 14px;
                cursor: pointer;
                box-shadow: var(--shadow-sm);
                transition: filter .15s ease, transform .05s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                filter: brightness(96%);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(1px);
                filter: brightness(92%);
            }

            .staticrypt-form .staticrypt-decrypt-button:focus-visible {
                outline: 2px solid var(--accent-deep);
                outline-offset: 2px;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 16px;
                font-size: 14px;
                color: var(--ink-2);
            }

            .staticrypt-remember input[type="checkbox"] {
                accent-color: var(--accent-strong);
                transform: scale(1.4);
                margin-right: 1em;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--canvas);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid var(--y300);
                border-right-color: transparent;
                border-radius: 50%;
                -webkit-animation: spinner-border 0.75s linear infinite;
                animation: spinner-border 0.75s linear infinite;
                animation-duration: 0.75s;
                animation-timing-function: linear;
                animation-delay: 0s;
                animation-iteration-count: infinite;
                animation-direction: normal;
                animation-fill-mode: none;
                animation-play-state: running;
                animation-name: spinner-border;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>
